# =============================================================================
# SonarQube — Project Configuration for Wannasingh Blog
# https://docs.sonarqube.org/latest/analysis/analysis-parameters/
# =============================================================================

# ─── Project Identity ────────────────────────────────────────────────────────
sonar.projectKey=Wannasingh_wannasingh-blog_9a2ef7b1-1234-45fe-88af-4ab0a52c03d9
sonar.projectName=wannasingh-blog
sonar.projectVersion=1.0.0
sonar.organization=Wannasingh

# ─── Sources ─────────────────────────────────────────────────────────────────
sonar.sources=client/src,server/src
sonar.tests=client/src,server/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.mjs,**/*.spec.js,**/*.spec.jsx,**/*.spec.mjs

# ─── Language ────────────────────────────────────────────────────────────────
sonar.language=js

# ─── JavaScript / LCOV Reports ───────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

# ─── Exclusions ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.min.js,\
  **/coverage/**,\
  **/*.config.{js,mjs,cjs},\
  **/public/**

sonar.cpd.exclusions=**/*.test.js,**/*.test.jsx,**/*.test.mjs,**/*.spec.js,**/*.spec.jsx,**/*.spec.mjs

# ─── Quality Gate ────────────────────────────────────────────────────────────
sonar.qualitygate.wait=true

# ─── Encoding ────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─── SCM ─────────────────────────────────────────────────────────────────────
sonar.scm.provider=git
