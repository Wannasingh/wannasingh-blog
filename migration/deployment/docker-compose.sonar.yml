version: "3.8"

name: wannasingh-sonarqube-local

services:
  # Downloader service to get the community branch plugin (enables branch analysis in community edition)
  sonar-plugin-download:
    image: alpine:latest
    container_name: sonar-plugin-download
    volumes:
      - sonarqube-extensions:/opt/sonarqube/extensions
    command: >
      sh -c "
        mkdir -p /opt/sonarqube/extensions/plugins &&
        cd /opt/sonarqube/extensions/plugins &&
        if [ ! -f sonarqube-community-branch-plugin-1.19.0.jar ]; then
          wget https://github.com/mc1arke/sonarqube-community-branch-plugin/releases/download/1.19.0/sonarqube-community-branch-plugin-1.19.0.jar;
        fi
      "

  # SonarQube core analysis server
  sonarqube:
    image: sonarqube:10.6-community
    container_name: wannasingh-sonarqube-local
    restart: unless-stopped
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
      - SONAR_WEB_JAVAADDITIONALOPTS=-javaagent:/opt/sonarqube/extensions/plugins/sonarqube-community-branch-plugin-1.19.0.jar=web
      - SONAR_CE_JAVAADDITIONALOPTS=-javaagent:/opt/sonarqube/extensions/plugins/sonarqube-community-branch-plugin-1.19.0.jar=ce
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    ports:
      - "9900:9000"
    networks:
      - sonar-network
    depends_on:
      sonar-plugin-download:
        condition: service_completed_successfully
      sonar-db:
        condition: service_healthy

  # Dedicated Postgres Database for SonarQube engine
  sonar-db:
    image: postgres:16-alpine
    container_name: wannasingh-sonar-db-local
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    networks:
      - sonar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sonar-network:
    driver: bridge

volumes:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
  sonar-db-data:
