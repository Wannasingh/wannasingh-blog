version: '3.8'

services:
  # 1. Nginx Reverse Proxy & React Frontend
  frontend:
    image: ${REGISTRY}/wannasingh-blog-frontend:${IMAGE_TAG:-latest}
    ports:
      # Map to a custom port (8081) on the VM host to avoid conflict with the native Nginx (port 80)
      - "8081:80"
    volumes:
      - uploads-data:/var/www/uploads:ro # Mount uploads read-only to frontend Nginx
    depends_on:
      - backend
    restart: always

  # 2. Node.js Express API Server
  backend:
    image: ${REGISTRY}/wannasingh-blog-backend:${IMAGE_TAG:-latest}
    ports:
      - "4001:4001"
    environment:
      # HashiCorp Vault Server credentials used by vault-env.sh script
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token # Development/Local testing token
      - VAULT_SECRET_PATH=secret/data/wannasingh-blog
      - UPLOADS_DIR=/var/www/uploads/posts
      - NODE_ENV=production
    volumes:
      - uploads-data:/var/www/uploads # Persistent local storage for articles & profiles upload
    depends_on:
      - vault
    restart: always

  # 3. HashiCorp Vault for local testing/development (Replace with Enterprise cluster in Production)
  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    restart: always

volumes:
  uploads-data:
    driver: local
